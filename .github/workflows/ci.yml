name: CI

on:
  pull_request:

# CI（運用規約 v3）
# - test: npm test を実行し、失敗でチェック失敗（ブロッキング・維持）
# - protected-files: PR が変更する保護対象ファイルをジョブサマリに表示する
#   非ブロッキング通知（マージはブロックしない。人間がマージ前に確認する）
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # 依存が無いため install は省略（package.json に dependencies なし）
      - run: npm test

  protected-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # merge-base 以降の差分を取るため全履歴を取得
          fetch-depth: 0
      - name: Summarize protected-file changes (non-blocking)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # 保護対象パス（行頭一致）。package-lock.json は対象外なので
          # package\.json は行頭完全一致で package-lock.json に誤ヒットしない。
          protected_regex='^(docs/|AGENTS\.md|CLAUDE\.md|\.github/workflows/|package\.json)'

          # このPRが merge-base 以降に加えた変更のうち保護対象のもの
          changed=$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}" | grep -E "$protected_regex" || true)

          {
            echo "## Protected-file changes"
            echo
            if [ -z "$changed" ]; then
              echo "このPRは保護対象ファイルを変更していません。"
            else
              echo "このPRは次の保護対象ファイルを変更します。マージ前に確認してください:"
              echo
              printf '%s\n' "$changed" | sed 's/^/- `/; s/$/`/'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # 通知のみ。protected-files はマージをブロックしない（運用規約 v3）。
          echo "protected-files summary written (non-blocking)"
